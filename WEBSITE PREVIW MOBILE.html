<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FLEXDRIVE — Mobile Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 2rem;
  }
  h1 {
    color: #fff;
    font-size: 1.2rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
    letter-spacing: .02em;
  }
  .toolbar {
    display: flex;
    gap: .8rem;
    margin-bottom: 1.5rem;
  }
  .toolbar button {
    padding: .5rem 1.2rem;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    border-radius: 8px;
    font-size: .82rem;
    cursor: pointer;
    transition: all .2s;
  }
  .toolbar button:hover, .toolbar button.active {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.4);
  }
  .phone-frame {
    position: relative;
    width: 393px;
    height: 852px;
    background: #000;
    border-radius: 50px;
    padding: 12px;
    box-shadow: 0 0 0 2px #333, 0 40px 80px rgba(0,0,0,0.5);
    transition: width .4s ease, height .4s ease, border-radius .4s ease;
  }
  .phone-frame.tablet {
    width: 820px;
    height: 1080px;
    border-radius: 30px;
  }
  .phone-frame .notch {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #000;
    border-radius: 0 0 18px 18px;
    z-index: 10;
  }
  .phone-frame .screen {
    width: 100%;
    height: 100%;
    border-radius: 40px;
    overflow: hidden;
    background: #fff;
  }
  .phone-frame.tablet .screen {
    border-radius: 20px;
  }
  .phone-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .nav-hint {
    color: rgba(255,255,255,0.4);
    font-size: .75rem;
    margin-top: 1rem;
    text-align: center;
  }
</style>
</head>
<body>

<h1>FLEXDRIVE — Preview Mobile</h1>

<div class="toolbar">
  <button class="active" onclick="setDevice('phone', this)">iPhone 15 Pro (393×852)</button>
  <button onclick="setDevice('tablet', this)">iPad (820×1080)</button>
</div>

<div class="phone-frame" id="frame">
  <div class="notch"></div>
  <div class="screen">
    <iframe src="WEBSITE FLEX.html" id="preview"></iframe>
  </div>
</div>

<div class="nav-hint">Scroll dentro do dispositivo para navegar · Use os botões acima para trocar de dispositivo</div>

<script>
function setDevice(type, btn) {
  const frame = document.getElementById('frame');
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (type === 'tablet') {
    frame.classList.add('tablet');
  } else {
    frame.classList.remove('tablet');
  }
}
</script>

</body>
</html>
